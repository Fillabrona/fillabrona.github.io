    const isMobile = () => window.matchMedia("(pointer: coarse)").matches;

    const tooltipEl = document.createElement('div');
    tooltipEl.className = 'fixed z-[9999] px-2.5 py-1.5 text-[10px] font-bold tracking-widest text-[#FFFFFF] bg-[#222222] rounded shadow-lg whitespace-nowrap select-none uppercase border border-white/10 transition-opacity duration-150 ease-in-out pointer-events-none opacity-0 invisible';
    document.body.appendChild(tooltipEl);

    let tooltipTimeout = null;
    let currentTrigger = null;

    const hideTooltip = () => {
      if (tooltipTimeout) clearTimeout(tooltipTimeout);
      tooltipEl.style.opacity = '0';
      setTimeout(() => {
        if (tooltipEl.style.opacity === '0') {
          tooltipEl.style.visibility = 'hidden';
        }
      }, 150);
      currentTrigger = null;
    };

    const showTooltip = (trigger, text) => {
      if (isMobile()) return;
      if (tooltipTimeout) clearTimeout(tooltipTimeout);

      currentTrigger = trigger;
      
      tooltipTimeout = setTimeout(() => {
        if (currentTrigger !== trigger) return;
        
        tooltipEl.textContent = text;
        tooltipEl.style.visibility = 'visible';
        
        const triggerRect = trigger.getBoundingClientRect();
        const tooltipRect = tooltipEl.getBoundingClientRect();
        
        let left = triggerRect.left + (triggerRect.width / 2) - (tooltipRect.width / 2);
        let top = triggerRect.top - tooltipRect.height - 8;
        
        const EDGE_PADDING = 16;

        if (top < EDGE_PADDING) {
          top = triggerRect.bottom + 8;
        }
        
        if (left < EDGE_PADDING) {
          left = EDGE_PADDING;
        }
        
        const viewportWidth = window.innerWidth;
        if (left + tooltipRect.width > viewportWidth - EDGE_PADDING) {
          left = viewportWidth - tooltipRect.width - EDGE_PADDING;
        }
        
        tooltipEl.style.top = `${top}px`;
        tooltipEl.style.left = `${left}px`;
        tooltipEl.style.opacity = '1';
      }, 1000);
    };

    document.querySelectorAll('.tooltip-trigger').forEach(trigger => {
      const text = trigger.getAttribute('data-tooltip');
      trigger.addEventListener('mouseenter', () => showTooltip(trigger, text));
      trigger.addEventListener('mouseleave', hideTooltip);
      trigger.addEventListener('focus', () => showTooltip(trigger, text));
      trigger.addEventListener('blur', hideTooltip);
    });

    window.addEventListener("scroll", hideTooltip, { capture: true, passive: true });
    window.addEventListener("resize", hideTooltip, { passive: true });
  </script>
</body>
</html>
